<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Psicopedagogía Paola Zabala</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--mg:#FF00CC;--pu:#6B3FA0;--pu-d:#4A2B72;--bg:#f5f0fa;--card:#fff;--text:#2A1245;--mid:#5A4070;--border:#E8E0F0}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--card);border-radius:24px;padding:2.5rem;max-width:400px;width:100%;box-shadow:0 8px 40px rgba(107,63,160,.1)}
.login-box h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;color:var(--mg);margin-bottom:.3rem}
.login-box p{font-size:.85rem;color:var(--mid);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.field input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Poppins',sans-serif;font-size:.9rem;outline:none;transition:border .2s}
.field input:focus{border-color:var(--mg)}
.btn{width:100%;padding:.85rem;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn-mg{background:linear-gradient(135deg,var(--mg),#CC00A3);color:#fff;box-shadow:0 4px 16px rgba(255,0,204,.25)}
.btn-mg:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,0,204,.35)}
.login-err{color:#c53030;font-size:.8rem;margin-top:.5rem;display:none}
/* DASHBOARD */
.dashboard{display:none}
.dash-header{background:var(--card);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.dash-header h2{font-family:'Nunito',sans-serif;font-weight:900;color:var(--mg);font-size:1.2rem}
.btn-logout{background:none;border:1.5px solid var(--pu);color:var(--pu);padding:.4rem 1rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:var(--pu);color:#fff}
.dash-body{max-width:1200px;margin:0 auto;padding:2rem}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(107,63,160,.06)}
.stat-card .num{font-family:'Nunito',sans-serif;font-weight:900;font-size:2rem;color:var(--mg);line-height:1}
.stat-card .lbl{font-size:.75rem;color:var(--mid);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:.3rem}
/* FILTERS */
.filters{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:.82rem;outline:none}
.filters input{flex:1;min-width:180px}
/* TABLE */
.table-wrap{background:var(--card);border-radius:16px;overflow-x:auto;box-shadow:0 2px 12px rgba(107,63,160,.06)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#f9f5ff;text-align:left;padding:.8rem 1rem;font-weight:600;color:var(--pu-d);text-transform:uppercase;font-size:.7rem;letter-spacing:.06em}
td{padding:.7rem 1rem;border-top:1px solid var(--border);vertical-align:middle}
tr:hover{background:#fdf8ff}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:6px;font-size:.7rem;font-weight:600;text-transform:uppercase}
.badge.pending{background:#FFF3CD;color:#856404}
.badge.contacted{background:#D1ECF1;color:#0C5460}
.badge.closed{background:#D4EDDA;color:#155724}
.act-btn{padding:.3rem .6rem;border:none;border-radius:6px;font-size:.7rem;font-weight:600;cursor:pointer;margin-right:.3rem;transition:all .15s}
.act-status{background:var(--mg);color:#fff}
.act-status:hover{opacity:.85}
.act-view{background:#EDE0FF;color:var(--pu-d)}
.act-reply{background:#D1ECF1;color:#0C5460}
/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:.5rem;margin-top:1rem;padding:1rem}
.pg-btn{padding:.4rem .8rem;border:1.5px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:.8rem;font-weight:600;color:var(--mid)}
.pg-btn.active{background:var(--mg);color:#fff;border-color:var(--mg)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:2rem}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:20px;padding:2rem;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal-box h3{font-family:'Nunito',sans-serif;font-weight:800;color:var(--pu);margin-bottom:1rem}
.modal-box p{font-size:.9rem;color:var(--mid);line-height:1.7}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--mid)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginSection">
  <div class="login-box">
    <h1>🧠 Panel Admin</h1>
    <p>Psicopedagogía Paola Zabala</p>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="loginUser" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" autocomplete="current-password">
    </div>
    <button class="btn btn-mg" id="loginBtn" style="margin-top:.5rem">Iniciar sesión</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <h2>Psicopedagogía · PZ — Admin</h2>
    <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
  </div>
  <div class="dash-body">
    <div class="stats" id="statsGrid">
      <div class="stat-card"><div class="num" id="statTotal">-</div><div class="lbl">Total consultas</div></div>
      <div class="stat-card"><div class="num" id="statPending">-</div><div class="lbl">Pendientes</div></div>
      <div class="stat-card"><div class="num" id="statContacted">-</div><div class="lbl">Contactadas</div></div>
      <div class="stat-card"><div class="num" id="statWeek">-</div><div class="lbl">Esta semana</div></div>
    </div>
    <div class="filters">
      <select id="filterStatus"><option value="">Todos los estados</option><option value="pending">Pendientes</option><option value="contacted">Contactadas</option><option value="closed">Cerradas</option></select>
      <input type="text" id="filterSearch" placeholder="Buscar por nombre o email...">
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Nombre</th><th>Email</th><th>Para quién</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="tableBody"></tbody></table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"><div class="modal-box"><button class="modal-close" id="modalClose">✕</button><h3 id="modalTitle"></h3><p id="modalBody"></p></div></div>

<script>
const API = '/api/admin';
const PER_PAGE = 10;
let token = sessionStorage.getItem('admin_token');
let allData = [];
let filtered = [];
let page = 1;

function headers(){return {'Content-Type':'application/json','Authorization':'Bearer '+token}}

// Check session
if(token){showDashboard()}

// Login
document.getElementById('loginBtn').addEventListener('click', async()=>{
  const u=document.getElementById('loginUser').value;
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  err.style.display='none';
  try{
    const r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(r.ok&&d.success){token=d.token;sessionStorage.setItem('admin_token',token);showDashboard()}
    else{err.textContent=d.error||'Error';err.style.display='block'}
  }catch(e){err.textContent='Error de conexión';err.style.display='block'}
});
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click()});

// Logout
document.getElementById('logoutBtn').addEventListener('click',()=>{sessionStorage.removeItem('admin_token');token=null;document.getElementById('dashboard').style.display='none';document.getElementById('loginSection').style.display='flex'});

async function showDashboard(){
  document.getElementById('loginSection').style.display='none';
  document.getElementById('dashboard').style.display='block';
  await loadStats();await loadConsultations();
}

async function loadStats(){
  try{const r=await fetch(API+'/stats',{headers:headers()});const d=await r.json();
    if(d.success){document.getElementById('statTotal').textContent=d.data.total;document.getElementById('statPending').textContent=d.data.pending;document.getElementById('statContacted').textContent=d.data.contacted;document.getElementById('statWeek').textContent=d.data.thisWeek}
    else if(r.status===401){sessionStorage.removeItem('admin_token');location.reload()}
  }catch(e){console.error(e)}
}

async function loadConsultations(){
  try{const r=await fetch(API+'/consultations',{headers:headers()});const d=await r.json();
    if(d.success){allData=d.data;applyFilters()}
    else if(r.status===401){sessionStorage.removeItem('admin_token');location.reload()}
  }catch(e){console.error(e)}
}

function applyFilters(){
  const status=document.getElementById('filterStatus').value;
  const search=document.getElementById('filterSearch').value.toLowerCase();
  filtered=allData.filter(c=>{
    if(status&&c.status!==status)return false;
    if(search&&!c.name.toLowerCase().includes(search)&&!c.email.toLowerCase().includes(search))return false;
    return true;
  });
  page=1;renderTable();
}
document.getElementById('filterStatus').addEventListener('change',applyFilters);
document.getElementById('filterSearch').addEventListener('input',applyFilters);

function renderTable(){
  const start=(page-1)*PER_PAGE;
  const slice=filtered.slice(start,start+PER_PAGE);
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML=slice.map(c=>{
    const d=new Date(c.created_at+'Z').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});
    const nextStatus=c.status==='pending'?'contacted':c.status==='contacted'?'closed':'pending';
    const statusLabel={pending:'Pendiente',contacted:'Contactada',closed:'Cerrada'};
    return `<tr>
      <td><strong>${esc(c.name)}</strong></td><td>${esc(c.email)}</td><td>${esc(c.audience||'-')}</td><td>${d}</td>
      <td><span class="badge ${c.status}">${statusLabel[c.status]}</span></td>
      <td>
        <button class="act-btn act-status" onclick="changeStatus(${c.id},'${nextStatus}')">→ ${statusLabel[nextStatus]}</button>
        <button class="act-btn act-view" onclick="viewMsg(${c.id})">Ver</button>
        <button class="act-btn act-reply" onclick="window.open('mailto:${esc(c.email)}?subject=Re: Tu consulta - Psicopedagogía Paola Zabala')">Responder</button>
      </td></tr>`;
  }).join('');
  renderPagination();
}

function renderPagination(){
  const total=Math.ceil(filtered.length/PER_PAGE);
  const el=document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return}
  el.innerHTML=Array.from({length:total},(_,i)=>`<button class="pg-btn${page===i+1?' active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');
}
window.goPage=function(p){page=p;renderTable()};

window.changeStatus=async function(id,status){
  try{const r=await fetch(API+'/consultations/'+id+'/status',{method:'PATCH',headers:headers(),body:JSON.stringify({status})});
    if(r.ok){await loadStats();await loadConsultations()}}catch(e){console.error(e)}
};

window.viewMsg=function(id){
  const c=allData.find(x=>x.id===id);if(!c)return;
  document.getElementById('modalTitle').textContent='Consulta de '+c.name;
  document.getElementById('modalBody').textContent=c.message;
  document.getElementById('modal').classList.add('show');
};
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('show'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')});

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
</script>
</body>
</html>
